# Junior — GitLab CI examples
# Copy the relevant job(s) into your .gitlab-ci.yml
#
# Image variants:
#   junior:pydantic — pydantic-ai backend only (default, smallest)
#   junior:codex    — codex CLI backend (requires Node + @openai/codex)
#   junior:full     — all backends (pydantic + codex + deepagents)

# ==============================================================================
# Option 1: pydantic + OpenAI
#
# CI/CD Variables required:
#   OPENAI_API_KEY    — sk-proj-...          (masked)
#   GITLAB_BOT_TOKEN  — glpat-... (api scope) (masked)
# ==============================================================================
code-review-pydantic-openai:
  stage: review
  image: registry.gitlab.com/mishachepi/junior-test-review/junior:pydantic
  variables:
    OPENAI_API_KEY: $OPENAI_API_KEY
    GITLAB_TOKEN: $GITLAB_BOT_TOKEN
    AGENT_BACKEND: pydantic
    MODEL_PROVIDER: openai
    MODEL_NAME: gpt-5.4-mini
    PROMPTS: security,logic,design
  script:
    - junior --publish
  rules:
    - if: $CI_MERGE_REQUEST_IID
  allow_failure: true


